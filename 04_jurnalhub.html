<div class="row align-items-end mb-4 border-bottom pb-3">
    <div class="col-md-6">
        <h2 class="fw-bold text-primary mb-1"><i class="bi bi-search-heart me-2"></i>Jurnal & Event Hub</h2>
        <p class="text-muted mb-0">Temukan tempat publikasi terbaik dan pantau jadwal konferensi mendatang.</p>
    </div>
    <div id="adminActionJurnal" class="col-md-6 text-md-end d-none">
        <button class="btn btn-primary btn-sm shadow-sm" onclick="openModalJurnal()">
            <i class="bi bi-plus-circle me-1"></i> Tambah Jurnal/Conference
        </button>
    </div>
</div>

<div class="card border-0 shadow-sm mb-4 bg-light">
    <div class="card-body p-3">
        <div class="row g-2">
            <div class="col-md-4">
                <input type="text" id="searchJurnal" class="form-control form-control-sm" placeholder="Cari Jurnal atau Konferensi...">
            </div>
            <div class="col-md-2">
                <select id="filterTipeHub" class="form-select form-select-sm">
                    <option value="Semua">Tipe: Semua</option>
                    <option value="Jurnal">Jurnal</option>
                    <option value="Prosiding">Prosiding</option>
                </select>
            </div>
            <div class="col-md-2">
                <select id="filterScopeHub" class="form-select form-select-sm">
                    <option value="Semua">Skala: Semua</option>
                    <option value="Nasional">Nasional</option>
                    <option value="Internasional">Internasional</option>
                </select>
            </div>
            <div class="col-md-2">
                <select id="filterPayHub" class="form-select form-select-sm">
                    <option value="Semua">Bayar: Semua</option>
                    <option value="Free">Free</option>
                    <option value="Hybrid">Hybrid</option>
                    <option value="Pay">Pay</option>
                </select>
            </div>
            <div class="col-md-2">
                <button class="btn btn-outline-secondary btn-sm w-100" id="btnRefreshHub"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
            </div>
        </div>
    </div>
</div>

<h5 class="fw-bold text-success mb-3 section-prosiding"><i class="bi bi-megaphone-fill me-2"></i>Upcoming Conferences</h5>
<div class="row g-3 mb-5" id="prosidingBannerContainer">
    </div>

<h5 class="fw-bold text-primary mb-3 section-jurnal"><i class="bi bi-journal-check me-2"></i>Journal Recommendation</h5>
<div class="card border-0 shadow-sm">
    <div class="table-responsive" style="max-height: 500px; overflow-y: auto;">
        <table class="table table-hover align-middle mb-0" style="font-size: 0.85rem;">
            <thead class="table-light position-sticky top-0 shadow-sm" style="z-index: 1;">
                <tr>
                    <th width="5%">No</th>
                    <th width="10%" class="text-center">Indeks</th>
                    <th width="35%">Jurnal & Publisher</th>
                    <th width="15%">Metrik (SJR/IF/H)</th>
                    <th width="20%">Pembayaran</th>
                    <th width="15%" class="text-center">Aksi</th>
                </tr>
            </thead>
            <tbody id="jurnalTableBody">
                </tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="modalJurnalHub" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-lg">
        <div class="modal-content shadow">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title fw-bold"><i class="bi bi-pencil-square me-2"></i>Form Data Publikasi</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body bg-light">
                <form id="formJurnalHub">
                    <input type="hidden" id="hubRowIdx">
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Jenis Data <span class="text-danger">*</span></label>
                        <select class="form-select border-primary" id="hubJenisData" required>
                            <option value="Jurnal">Jurnal</option>
                            <option value="Prosiding">Prosiding/Conference</option>
                        </select>
                    </div>

                    <div id="fieldsJurnal" class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label small">Tipe <span class="text-danger">*</span></label>
                            <select class="form-select form-select-sm" id="j_tipe" required>
                                <option value="" disabled selected>Pilih Tipe...</option>
                                <option value="Internasional">Internasional</option>
                                <option value="Nasional">Nasional</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small">Indeksasi <span class="text-danger">*</span></label>
                            <select class="form-select form-select-sm" id="j_indeks" required disabled>
                                <option value="" disabled selected>Pilih Tipe Dulu...</option>
                            </select>
                        </div>
                        <div class="col-md-4"><label class="form-label small">SJR</label><input type="text" class="form-control form-control-sm" id="j_sjr" placeholder="Misal: 0.45"></div>
                        <div class="col-md-4"><label class="form-label small">Impact Factor (IF)</label><input type="text" class="form-control form-control-sm" id="j_if" placeholder="Misal: 2.1"></div>
                        <div class="col-md-4"><label class="form-label small">H-Index</label><input type="text" class="form-control form-control-sm" id="j_hindex" placeholder="Misal: 12"></div>
                        
                        <div class="col-md-12"><label class="form-label small">Nama Jurnal/Artikel <span class="text-danger">*</span></label><input type="text" class="form-control form-control-sm" id="j_nama" required></div>
                        
                        <div class="col-md-6"><label class="form-label small">Negara</label><input type="text" class="form-control form-control-sm" id="j_negara" placeholder="Misal: Indonesia"></div>
                        
                        <div class="col-md-6"><label class="form-label small">Publisher</label><input type="text" class="form-control form-control-sm" id="j_publisher"></div>
                        <div class="col-md-6"><label class="form-label small">Tipe Pembayaran</label>
                            <select class="form-select form-select-sm" id="j_paytype">
                                <option value="Free">Free</option><option value="Pay">Pay</option><option value="Hybrid">Hybrid</option>
                            </select>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label small">APC (Biaya)</label>
                            <div class="input-group input-group-sm">
                                <select class="form-select border-secondary text-secondary px-2" id="j_currency" style="max-width: 85px;">
                                    <option value="Rp">Rp</option><option value="$">$</option>
                                    <option value="€">€</option><option value="£">£</option>
                                </select>
                                <input type="text" class="form-control form-control-sm currency-input" id="j_apc" placeholder="Misal: 3.000.000">
                            </div>
                        </div>
                        <div class="col-md-12"><label class="form-label small">URL Jurnal <span class="text-danger">*</span></label><input type="url" class="form-control form-control-sm" id="j_url" required></div>
                    </div>

                    <div id="fieldsProsiding" class="row g-3 d-none">
                        <div class="col-md-6">
                            <label class="form-label small">Tipe <span class="text-danger">*</span></label>
                            <select class="form-select form-select-sm" id="p_tipe" required>
                                <option value="" disabled selected>Pilih Tipe...</option>
                                <option value="Internasional">Internasional</option>
                                <option value="Nasional">Nasional</option>
                            </select>
                        </div>
                        <div class="col-md-6"><label class="form-label small">Batas Akhir (Deadline) <span class="text-danger">*</span></label><input type="date" class="form-control form-control-sm" id="p_batas"></div>
                        <div class="col-md-12"><label class="form-label small">Nama Conference <span class="text-danger">*</span></label><input type="text" class="form-control form-control-sm" id="p_nama"></div>
                        
                        <div class="col-md-6"><label class="form-label small">Negara</label><input type="text" class="form-control form-control-sm" id="p_negara" placeholder="Misal: United Kingdom"></div>
                        
                        <div class="col-md-6"><label class="form-label small">Publisher/Prosiding</label><input type="text" class="form-control form-control-sm" id="p_publisher"></div>
                        
                        <div class="col-md-12">
                            <label class="form-label small">Registration Fee Presenter</label>
                            <div class="input-group input-group-sm">
                                <select class="form-select border-secondary text-secondary px-2" id="p_currency" style="max-width: 85px;">
                                    <option value="Rp">Rp</option><option value="$">$</option>
                                    <option value="€">€</option><option value="£">£</option>
                                </select>
                                <input type="text" class="form-control form-control-sm currency-input" id="p_fee" placeholder="Misal: 1.500.000">
                            </div>
                        </div>
                        <div class="col-md-12"><label class="form-label small">URL Conference <span class="text-danger">*</span></label><input type="url" class="form-control form-control-sm" id="p_url"></div>
                    </div>
                </form>
            </div>
            <div class="modal-footer bg-light">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                <button type="button" class="btn btn-primary fw-bold" onclick="saveDataHub()"><i class="bi bi-save me-1"></i>Simpan</button>
            </div>
        </div>
    </div>
</div>
